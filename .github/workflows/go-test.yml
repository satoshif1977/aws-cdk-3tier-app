name: Go Test

on:
  push:
    branches: [main]
    paths:
      - "scripts_go/**"
      - ".github/workflows/go-test.yml"
  pull_request:
    branches: [main]
    paths:
      - "scripts_go/**"
      - ".github/workflows/go-test.yml"

jobs:
  go-test:
    name: Go ユニットテスト
    runs-on: ubuntu-latest
    env:
      AWS_DEFAULT_REGION: ap-northeast-1
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        working-directory: scripts_go
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: scripts_go/go.mod
      - name: go mod download
        run: go mod download
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test -v ./verify_stack/... -coverprofile=coverage.out -covermode=atomic
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: scripts_go/coverage.out
          flags: go
          fail_ci_if_error: false
